apiVersion: v1
kind: Service
metadata:
  name: minio-service
  labels:
    app: minio
spec:
  type: NodePort # Công bố ra máy chủ Host Windows để bạn gõ localhost:9001
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30000
      name: api
    - port: 9001
      targetPort: 9001
      nodePort: 30001
      name: console
  selector:
    app: minio
