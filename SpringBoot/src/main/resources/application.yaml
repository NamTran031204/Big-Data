spring:
  # 1. C?u hěnh PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/olist_db
    username: admin
    password: password123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 2. C?u hěnh MongoDB
  data:
    mongodb:
      uri: mongodb://admin:password123@127.0.0.1:27017/olist_db?authSource=admin

  # 3. C?u hěnh Kafka
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: olist-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# 4. C?u hěnh Server
server:
  port: 8080

# 5. C?u hěnh Logging
logging:
  level:
    root: INFO
    org.springframework.data.mongodb: DEBUG
    org.springframework.kafka: INFO

eureka:
  client:
    # T?t vi?c ??ng ký v?i Server vě měnh ch?a có Eureka Server ch?y
    enabled: false
    register-with-eureka: false
    fetch-registry: false